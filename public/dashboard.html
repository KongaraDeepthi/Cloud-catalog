<!DOCTYPE html>
<html>

<head>
<title>Intelligent Cloud Application Catalog System</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
text-align:center;
}

header{
background:#2c3e50;
color:white;
padding:20px;
}

.container{
margin:40px auto;
width:60%;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

h2{
color:#333;
}

button{
background:#3498db;
color:white;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:5px;
cursor:pointer;
margin-bottom:20px;
}

button:hover{
background:#2980b9;
}

ul{
list-style:none;
padding:0;
}

li{
background:#ecf0f1;
margin:10px 0;
padding:12px;
border-radius:6px;
font-weight:bold;
}

a{
display:inline-block;
margin-top:20px;
text-decoration:none;
background:#27ae60;
color:white;
padding:10px 18px;
border-radius:6px;
}

a:hover{
background:#1e8449;
}

</style>

</head>

<body>

<header>
<h1>Intelligent Cloud Application Catalog System</h1>
</header>

<div class="container">

<h2>Analytics Dashboard</h2>

<p>View the most frequently used cloud applications in the system.</p>

<button onclick="loadAnalytics()">Load Analytics</button>

<ul id="analyticsList"></ul>

<a href="index.html">Back to Application Catalog</a>

</div>

<script src="script.js"></script>

</body>

</html>
